<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="TSM79 — Sovereign AI Control Plane. The inline AI firewall.">
  <defs>
    <style>
      .wm   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 800; }
      .h    { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
      .mono { font-family: 'SF Mono','Consolas','Roboto Mono', ui-monospace, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#0A0B0D"/>

  <!-- hairline grid -->
  <g stroke="#15171B" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="860" y1="0" x2="860" y2="640"/>
  </g>

  <!-- frame + corner ticks -->
  <rect x="36" y="36" width="1208" height="568" fill="none" stroke="#23262C"/>
  <g stroke="#C7F23E" stroke-width="2" fill="none">
    <path d="M36 60 L36 36 L60 36"/>
    <path d="M1220 36 L1244 36 L1244 60"/>
    <path d="M36 580 L36 604 L60 604"/>
    <path d="M1220 604 L1244 604 L1244 580"/>
  </g>

  <!-- top label -->
  <text class="mono" x="72" y="96" font-size="15" letter-spacing="4" fill="#8A8F98">// THE SOVEREIGN MECHANICA</text>

  <!-- wordmark -->
  <text class="wm" x="68" y="280" font-size="184" letter-spacing="-6" fill="#ECEEEA">TSM79</text>
  <rect x="74" y="306" width="520" height="8" fill="#C7F23E"/>

  <!-- tagline -->
  <text class="mono" x="74" y="372" font-size="30" letter-spacing="9" fill="#C7F23E">SOVEREIGN AI CONTROL PLANE</text>

  <!-- pitch -->
  <text class="h" x="74" y="436" font-size="27" fill="#ECEEEA">The inline AI firewall.</text>
  <text class="mono" x="74" y="472" font-size="17" fill="#8A8F98">Every prompt evaluated before it leaves the perimeter.</text>

  <!-- verdict rail -->
  <text class="mono" x="74" y="540" font-size="17" letter-spacing="1">
    <tspan fill="#5B6068">VERDICT&#160;&#160;</tspan><tspan fill="#ECEEEA">allow · redact · route_local · quarantine ·</tspan><tspan fill="#C7F23E">&#160;block</tspan>
  </text>

  <!-- right column: proof column -->
  <g class="mono" font-size="16">
    <text x="912" y="200" fill="#5B6068" letter-spacing="2">// STACK</text>
    <text x="912" y="234" fill="#B9BEC6">Rust · Python · Go</text>
    <text x="912" y="258" fill="#B9BEC6">Java · C# · C++</text>
    <text x="912" y="282" fill="#B9BEC6">eBPF/XDP · TypeScript</text>

    <text x="912" y="346" fill="#5B6068" letter-spacing="2">// PROPERTIES</text>
    <text x="912" y="380" fill="#B9BEC6">microsecond fast path</text>
    <text x="912" y="404" fill="#B9BEC6">fail-closed by design</text>
    <text x="912" y="428" fill="#B9BEC6">tamper-evident audit</text>
    <text x="912" y="452" fill="#B9BEC6">.tsm sovereign overlay</text>
  </g>

  <!-- footer strip -->
  <text class="mono" x="72" y="588" font-size="14" fill="#5B6068">github.com/tsm7979/tsm79</text>
  <text class="mono" x="1208" y="588" font-size="14" fill="#5B6068" text-anchor="end">MIT · v3.1.0</text>
</svg>
