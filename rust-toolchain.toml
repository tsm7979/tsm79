# Pinned Rust toolchain for the dataplane and related Rust crates.
#
# History: rustc 1.94.0 AND 1.95.0 both produce an internal compiler error
# (ICE in early_lint_checks during AST lowering) when building the dataplane
# crate -- see GH issue #36. This was a *compiler* bug, not a source bug:
# the dataplane source is fine. The ICE is fixed in rustc 1.96.0
# (released 2026-05-25), which compiles the dataplane cleanly (warnings only).
#
# Therefore the pin is 1.96.0 -- the first toolchain on which the dataplane
# actually builds. Do NOT downgrade below 1.96.0.
#
# Bumping this:
#   1. Verify `cargo check --bins` is green on the candidate toolchain
#   2. Update this file + docs/RUST_TOOLCHAIN.md
#
# Contributors: rustup installs this toolchain automatically on first cargo use.

[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
