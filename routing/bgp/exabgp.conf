# ExaBGP configuration for TSM AI Firewall BGP route announcements.
#
# This makes TSM a BGP speaker that announces AI provider CIDRs,
# routing traffic through TSM nodes before it reaches OpenAI/Anthropic.
#
# Install:
#   apt install exabgp
#   exabgp /opt/tsm/routing/bgp/exabgp.conf
#
# Test:
#   exabgp --test /opt/tsm/routing/bgp/exabgp.conf

process tsm-controller {
    run /opt/tsm/routing/bgp/exabgp_process.py;
    encoder json;
}

template {
    neighbor tsm-peer {
        router-id           ${TSM_ROUTER_ID};     # e.g. 10.0.0.1
        local-address       ${TSM_LOCAL_ADDRESS}; # this node's IP
        local-as            ${TSM_LOCAL_AS};      # e.g. 65000
        peer-as             ${TSM_PEER_AS};       # upstream AS
        hold-time           30;
        graceful-restart;

        # Capabilities
        capability {
            graceful-restart;
        }

        # Only send routes we own; don't receive/relay upstream routes
        family {
            ipv4 unicast;
        }

        process tsm-controller;
    }
}

# Primary upstream peer (datacenter router or IXP route server)
neighbor ${TSM_PEER_1_IP} {
    inherit tsm-peer;
    description "Primary upstream peer";
}

# Secondary upstream peer (for redundancy)
neighbor ${TSM_PEER_2_IP} {
    inherit tsm-peer;
    description "Secondary upstream peer";
}
