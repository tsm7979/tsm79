version: "3.9"

# TSMv2 — The Sovereign AI Data Plane
# Production docker-compose
#
# Quick start:
#   cp .env.example .env        # add your API keys + TSM_AUDIT_SECRET
#   docker compose up -d
#   docker compose ps           # verify all healthy
#
# Architecture (v2):
#   dataplane  (Rust, port 8080) — replaces proxy + proxy-go
#   detector   (Python, port 8001) — unchanged, called only for Ambiguous verdicts
#   dashboard  (Next.js, port 3001) — unchanged, reads /metrics from dataplane
#   db         (PostgreSQL) — for detector's ML state

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # Shared state backend for behavioral analysis and correlation engine.
  # When REDIS_URL is set, all detector pods read/write the same sliding-window
  # state — no pod has a private view of org velocity or dedup counters.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tsm
      POSTGRES_USER:     tsm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsm"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # ── Detection service (Python / FastAPI) ──────────────────────────────────────
  # Called only for "Ambiguous" verdicts (~10-20% of traffic).
  # The Rust data plane fast-path handles the other 80-90% without calling here.
  detector:
    build:
      context: .
      dockerfile: Dockerfile.detector
    restart: unless-stopped
    environment:
      DETECTOR_PORT:     "8001"
      DATABASE_URL:      postgresql://tsm:${POSTGRES_PASSWORD}@db:5432/tsm
      TSM_POLICY_PATH:   /data/policy.json
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TSM_WEBHOOK_URL:   ${TSM_WEBHOOK_URL:-}
      TSM_LOG_FORMAT:    json
      REDIS_URL:         redis://redis:6379/0
      GRPC_PORT:         "50051"
      MODEL_STORE_PATH:  /data/models
    volumes:
      - tsmdata:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── TSMv2 Data Plane (Rust) ────────────────────────────────────────────────
  # Replaces the TypeScript proxy and Go proxy-go from v1.
  # Owns the full data path: TLS termination → HTTP parsing → detection
  # → policy → upstream forwarding.
  dataplane:
    build:
      context: .
      dockerfile: Dockerfile.dataplane
    restart: unless-stopped
    ports:
      - "${TSM_PORT:-8080}:8080"
    environment:
      TSM_LISTEN:                "0.0.0.0:8080"
      TSM_DETECTOR_URL:          "http://detector:8001"
      TSM_DETECTOR_TIMEOUT_MS:   "${TSM_DETECTOR_TIMEOUT_MS:-5000}"
      TSM_AUDIT_LOG:             "/var/log/tsm/audit.log"
      TSM_AUDIT_SECRET:          "${TSM_AUDIT_SECRET:?TSM_AUDIT_SECRET required}"
      TSM_POOL_MAX_IDLE:         "${TSM_POOL_MAX_IDLE:-8}"
      TSM_DETECTOR_FAILURE_MODE: "${TSM_DETECTOR_FAILURE_MODE:-allow}"
      TSM_RATE_LIMIT:            "${TSM_RATE_LIMIT:-100}"
      TSM_LOG_LEVEL:             "${TSM_LOG_LEVEL:-info}"
      OPENAI_API_KEY:            "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY:         "${ANTHROPIC_API_KEY:-}"
    volumes:
      - audit_log:/var/log/tsm
    depends_on:
      detector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Control Plane (Go) ────────────────────────────────────────────────────
  # Cluster coordination: policy versioning, health federation, node registry.
  # Dataplane nodes self-register on startup and poll for policy updates.
  control-plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TSM_CP_PORT:-9090}:9090"
    environment:
      TSM_CP_PORT:             "9090"
      TSM_CP_HEALTH_INTERVAL:  "10s"
      TSM_CP_LOG_LEVEL:        "${TSM_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Dashboard (Next.js) ────────────────────────────────────────────────────
  # Reads /metrics from the dataplane (same Prometheus text format as v1 proxy).
  # No changes required to the dashboard itself.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      NEXT_PUBLIC_PROXY_URL: "${PROXY_EXTERNAL_URL:-http://localhost:8080}"
    depends_on:
      dataplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  pgdata:
  tsmdata:
  audit_log:
