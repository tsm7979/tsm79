##############################################################################
# TSM Enterprise — per-service routing
#
# Routes:
#   /               → dashboard:3001      (Next.js SOC UI)
#   /v1/            → dataplane:8080      (AI proxy — OpenAI/Anthropic compat)
#   /api/           → admin-api:9090      (Enterprise REST API)
#   /cp/            → control-plane:9091  (Admin-only: policy + node registry)
#   /health         → synthetic 200       (Load balancer health check)
##############################################################################

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen       80  default_server;
    listen  [::]:80  default_server;
    server_name  _;

    # Allow LB / Docker healthcheck without redirect
    location = /health {
        access_log  off;
        return 200  '{"status":"ok"}';
        add_header  Content-Type  application/json;
    }

    location / {
        return 301  https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────────────────
server {
    listen       443 ssl http2  default_server;
    listen  [::]:443 ssl http2  default_server;
    server_name  _;                            # SNI override in production

    ssl_certificate      /etc/nginx/certs/tls.crt;
    ssl_certificate_key  /etc/nginx/certs/tls.key;

    # HSTS — 1 year once TLS is stable
    add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains"  always;

    # ── Health (unauthenticated — used by Docker healthcheck + LB) ───────────
    location = /health {
        access_log  off;
        return 200  '{"status":"ok"}';
        add_header  Content-Type  application/json;
    }

    # ── AI Proxy (/v1/ → dataplane) ──────────────────────────────────────────
    # Handles both standard and streaming (SSE) ChatCompletion / Embeddings calls.
    location /v1/ {
        limit_req       zone=ai_proxy  burst=30  delay=20;
        limit_req_status  429;

        proxy_pass          http://dataplane;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";   # keepalive

        # SSE streaming: disable buffering so chunks reach clients immediately
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       300s;

        # Forward Authorization header (Bearer token) unchanged
        proxy_pass_header  Authorization;

        # 429 custom error body
        error_page  429  @rate_limited;
    }

    # ── Enterprise Admin API (/api/ → admin-api) ──────────────────────────────
    location /api/ {
        # Auth endpoints get tighter rate limit
        location /api/auth/ {
            limit_req        zone=auth  burst=5  nodelay;
            limit_req_status   429;

            proxy_pass          http://admin_api;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    Connection         "";
        }

        limit_req        zone=admin_api  burst=20  delay=10;
        limit_req_status   429;

        proxy_pass          http://admin_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";

        # Actuator health endpoint (used by docker-compose healthcheck)
        location /api/actuator/ {
            allow  172.20.0.0/24;           # tsm-internal only
            deny   all;
            proxy_pass  http://admin_api;
        }

        error_page  429  @rate_limited;
    }

    # ── Control Plane (/cp/ → control-plane) ─────────────────────────────────
    # Restricted to requests bearing a valid TSM_ADMIN_TOKEN header.
    # In production, further restrict by source IP (e.g., bastion host).
    location /cp/ {
        # Only allow from internal network — block external access
        allow  172.20.0.0/24;
        deny   all;

        proxy_pass          http://control_plane;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
    }

    # ── Dashboard (/ → Next.js) ───────────────────────────────────────────────
    location / {
        proxy_pass          http://dashboard;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        # WebSocket support (Next.js HMR + live dashboard)
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
        proxy_cache_bypass  $http_upgrade;

        # Static assets: cache aggressively at edge
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
            proxy_pass          http://dashboard;
            proxy_cache_valid   200  7d;
            add_header          Cache-Control  "public, max-age=604800, immutable";
            access_log          off;
        }
    }

    # ── Named locations (error responses) ─────────────────────────────────────
    location @rate_limited {
        default_type  application/json;
        return  429  '{"error":{"type":"rate_limit_exceeded","message":"Too many requests. Please slow down and retry after 60 seconds.","retry_after":60}}';
    }
}
