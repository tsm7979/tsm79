##############################################################################
# TSM mTLS — Mutual TLS for inter-service communication — Gap 1 fix
#
# This file adds a separate mTLS server block on port 8444 that requires
# client certificates.  All internal TSM service-to-service calls
# (admin-api → dataplane, control-plane → dataplane) use this port.
#
# External clients (end-users, SDKs) still use port 443 (tsm.conf).
# Only services presenting a valid TSM-issued client cert may use port 8444.
#
# Certificate setup:
#   ./deploy/scripts/gen-mtls-certs.sh   (creates CA + server + client certs)
#
# Architecture:
#   External clients  → nginx:443  → no client cert required
#   Internal services → nginx:8444 → client cert REQUIRED (mTLS)
#   All decryption happens in the KERNEL via nginx's TLS stack (not at edge).
#   No edge proxy sees plaintext — sovereignty maintained.
##############################################################################

# ── mTLS upstream server (internal services only) ─────────────────────────────
server {
    listen      8444 ssl http2;
    listen [::]:8444 ssl http2;
    server_name _;

    # Server certificate (same as public)
    ssl_certificate      /etc/nginx/certs/tls.crt;
    ssl_certificate_key  /etc/nginx/certs/tls.key;

    # Client certificate verification — REQUIRED
    ssl_client_certificate /etc/nginx/certs/tsm-ca.crt;
    ssl_verify_client      on;
    ssl_verify_depth       2;

    # Strict TLS — no TLS 1.2 for internal service comms.
    # TLS 1.3 ciphersuites must use ssl_conf_command (the ssl_ciphers directive
    # only accepts TLS 1.2-and-below OpenSSL cipher names → "no cipher match").
    ssl_protocols              TLSv1.3;
    ssl_conf_command           Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

    # Pass client cert info to upstream for audit
    proxy_set_header  X-TSM-Client-CN     $ssl_client_s_dn;
    proxy_set_header  X-TSM-Client-Verify $ssl_client_verify;

    # ── Internal AI proxy endpoint ─────────────────────────────────────────────
    location /v1/ {
        # No rate limiting on the mTLS port — services have their own backpressure
        proxy_pass          http://dataplane;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-Proto  "https-mtls";
        proxy_set_header    Connection         "";
        proxy_buffering     off;
        proxy_read_timeout  300s;
    }

    # ── Internal admin API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://admin_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-Proto  "https-mtls";
        proxy_set_header    Connection         "";
    }

    # ── Control plane (no restrict by IP — cert is sufficient auth) ────────────
    location /cp/ {
        proxy_pass          http://control_plane;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-Proto  "https-mtls";
        proxy_set_header    Connection         "";
    }

    # ── Health (for internal LB / k8s probes — cert still required) ───────────
    location = /health {
        access_log  off;
        return 200  '{"status":"ok","tls":"mtls"}';
        add_header  Content-Type  application/json;
    }

    # Reject uncertified connections explicitly
    error_page 495 496 @mtls_error;
    location @mtls_error {
        default_type  application/json;
        return  403  '{"error":{"type":"mtls_required","message":"Client certificate required for internal service endpoints."}}';
    }
}
