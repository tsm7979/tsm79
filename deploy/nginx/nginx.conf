##############################################################################
# TSM Enterprise — Nginx main config
# TLS termination, connection limits, rate limiting zones, gzip.
# Per-service routing lives in conf.d/tsm.conf
##############################################################################

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65536;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  json_combined  escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_id":"$request_id"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # ── Core performance ──────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    reset_timedout_connection on;

    server_tokens  off;                    # hide nginx version

    # ── Timeouts ─────────────────────────────────────────────────────────────
    client_header_timeout   10s;
    client_body_timeout     60s;          # allow streaming request bodies
    send_timeout            60s;
    proxy_read_timeout     300s;          # SSE streams can be long-lived
    proxy_send_timeout      60s;
    proxy_connect_timeout    5s;

    # ── Request size limits ──────────────────────────────────────────────────
    client_max_body_size    16m;          # max request body (tune per deployment)
    client_body_buffer_size  64k;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # AI proxy: 120 req/min per IP (burst 30 → delays, not drops)
    limit_req_zone  $binary_remote_addr  zone=ai_proxy:20m  rate=120r/m;
    # Admin API: 60 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=admin_api:10m  rate=60r/m;
    # Auth endpoints: 20 req/min (brute-force protection)
    limit_req_zone  $binary_remote_addr  zone=auth:10m  rate=20r/m;

    # ── Connection limit per IP ───────────────────────────────────────────────
    limit_conn_zone  $binary_remote_addr  zone=per_ip:20m;
    limit_conn       per_ip  100;

    # ── SSL settings (applied in server blocks below) ─────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:20m;
    ssl_session_timeout        10m;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   8.8.8.8 8.8.4.4  valid=300s;
    resolver_timeout           5s;

    # ── Security headers (common defaults — overridden per location) ───────────
    add_header  X-Frame-Options         "DENY"              always;
    add_header  X-Content-Type-Options  "nosniff"           always;
    add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header  X-Request-ID            $request_id         always;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream dataplane {
        server dataplane:8080;
        keepalive 64;
    }

    upstream admin_api {
        server admin-api:9090;
        keepalive 32;
    }

    upstream control_plane {
        server control-plane:9091;
        keepalive 8;
    }

    upstream dashboard {
        server dashboard:3001;
        keepalive 16;
    }

    # ── Include per-service routing ────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
