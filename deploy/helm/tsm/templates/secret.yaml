apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "tsm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.openaiApiKey }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.webhookUrl }}
  tsm-webhook-url: {{ .Values.secrets.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.clickhousePassword }}
  clickhouse-password: {{ .Values.secrets.clickhousePassword | quote }}
  {{- end }}
  {{- if .Values.secrets.nvdApiKey }}
  nvd-api-key: {{ .Values.secrets.nvdApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.abuseipdbKey }}
  abuseipdb-key: {{ .Values.secrets.abuseipdbKey | quote }}
  {{- end }}
  {{- if .Values.secrets.otxApiKey }}
  otx-api-key: {{ .Values.secrets.otxApiKey | quote }}
  {{- end }}
