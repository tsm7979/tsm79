apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "tsm.labels" . | nindent 4 }}
data:
  TSM_DETECTOR_URL: "http://{{ .Release.Name }}-detector:{{ .Values.detector.port }}"
  TSM_PORT: {{ .Values.proxy.port | quote }}
  TSM_RATE_LIMIT: {{ .Values.proxy.rateLimit | quote }}
  TSM_LOG_FORMAT: {{ .Values.proxy.logFormat | quote }}
  DETECTOR_PORT: {{ .Values.detector.port | quote }}
  DETECTOR_WORKERS: {{ .Values.detector.workers | quote }}
  LOG_LEVEL: {{ .Values.detector.logLevel | quote }}
  {{- if .Values.threatIntel.enabled }}
  TSM_INTEL_URL: "http://{{ .Release.Name }}-threat-intel:{{ .Values.threatIntel.port }}"
  {{- end }}
  {{- if .Values.clickhouse.enabled }}
  TSM_CLICKHOUSE_URL: "http://tsm:$(CLICKHOUSE_PASSWORD)@{{ .Release.Name }}-clickhouse:8123"
  {{- end }}
---
{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-schema
  labels:
    {{- include "tsm.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  schema.sql: |
    CREATE DATABASE IF NOT EXISTS tsm;
    CREATE TABLE IF NOT EXISTS tsm.ai_requests
    (
        timestamp           DateTime64(3, 'UTC') NOT NULL,
        date                Date                 MATERIALIZED toDate(timestamp),
        request_id          String,
        session_id          String,
        org_id              String,
        workspace_id        String,
        node_id             String,
        model               LowCardinality(String),
        provider            LowCardinality(String),
        action              LowCardinality(String),
        risk_score          Float32,
        pii_types           Array(String),
        rule_fired          String,
        client_ip           String,
        user_agent          String,
        ja3_hash            String,
        ja4                 String,
        request_bytes       UInt32,
        response_bytes      UInt32,
        latency_ms          UInt32,
        upstream_status     UInt16
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (timestamp, org_id, workspace_id)
    TTL toDateTime(timestamp) + INTERVAL 90 DAY;
{{- end }}
