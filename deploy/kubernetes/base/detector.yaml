---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsm-detector
  namespace: tsm
  labels:
    app: tsm-detector
    app.kubernetes.io/component: detector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsm-detector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tsm-detector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8001"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: detector
          image: tsm/detector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: tsm-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tsm-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tsm-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu:    "500m"
              memory: "512Mi"
            limits:
              cpu:    "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: detector-svc
  namespace: tsm
  labels:
    app: tsm-detector
spec:
  selector:
    app: tsm-detector
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tsm-detector-hpa
  namespace: tsm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tsm-detector
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
