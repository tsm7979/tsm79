---
# ebpf-daemonset: Runs the dual-XDP loader (tsm_multi_loader) on every node.
# Requires privileged access to attach XDP programs at NIC driver level.
#
# Security capabilities required:
#   CAP_NET_ADMIN — attach/detach XDP programs, modify netfilter rules
#   CAP_BPF       — load BPF programs and access pinned maps
#   CAP_SYS_ADMIN — mount bpffs at /sys/fs/bpf (if not already mounted)
#
# hostNetwork: true — so XDP programs see the actual host network interface
# hostPID: true     — so the loader can monitor processes for policy sync
#
# The loader syncs the XDP ip-blocklist map from Redis every 30 seconds.
# BPF maps are pinned at /sys/fs/bpf/tsm/ and survive loader restarts.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tsm-ebpf-loader
  namespace: tsm
  labels:
    app: tsm-ebpf-loader
    app.kubernetes.io/component: ebpf
spec:
  selector:
    matchLabels:
      app: tsm-ebpf-loader
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: tsm-ebpf-loader
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9200"
        prometheus.io/path:   "/metrics"
    spec:
      hostNetwork: true
      hostPID: true
      terminationGracePeriodSeconds: 15
      tolerations:
        # Run on all nodes including masters
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      initContainers:
        # Mount bpffs if not already mounted (required for map pinning)
        - name: mount-bpffs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mountpoint -q /sys/fs/bpf || mount -t bpf bpf /sys/fs/bpf
              mkdir -p /sys/fs/bpf/tsm
          securityContext:
            privileged: true
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
      containers:
        - name: loader
          image: tsm/ebpf-loader:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/sbin/tsm_multi_loader
            - --iface
            - $(TSM_XDP_IFACE)
            - --ddos-obj
            - /usr/local/lib/tsm/xdp_ddos.o
            - --filter-obj
            - /usr/local/lib/tsm/xdp_ai_filter.o
            - --cidrs
            - /etc/tsm/ai_cidrs.txt
            - --pin
            - /sys/fs/bpf/tsm
            - --redis
            - $(TSM_REDIS_URL)
            - --control
            - /run/tsm/loader.sock
          env:
            - name: TSM_XDP_IFACE
              valueFrom:
                configMapKeyRef:
                  name: tsm-config
                  key: xdp-interface
                  optional: true
            - name: TSM_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tsm-secrets
                  key: redis-url
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - BPF
                - SYS_ADMIN
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: run-tsm
              mountPath: /run/tsm
            - name: ai-cidrs
              mountPath: /etc/tsm
              readOnly: true
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          # The loader runs indefinitely — it blocks in poll()/epoll() on the
          # control socket and the Redis sync thread.  A liveness probe checks
          # the control socket responds to STATUS.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "echo STATUS | socat - UNIX-SENDTO:/run/tsm/loader.sock | grep -q uptime"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      volumes:
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: run-tsm
          hostPath:
            path: /run/tsm
            type: DirectoryOrCreate
        - name: ai-cidrs
          configMap:
            name: tsm-ai-cidrs
            optional: true
---
# ConfigMap for the AI CIDR list (override with your specific provider CIDRs)
apiVersion: v1
kind: ConfigMap
metadata:
  name: tsm-ai-cidrs
  namespace: tsm
data:
  ai_cidrs.txt: |
    # OpenAI / Azure OpenAI
    104.18.0.0/16   openai
    104.19.0.0/16   openai
    52.0.0.0/8      openai
    13.32.0.0/15    openai
    20.0.0.0/11     azure_oai
    40.64.0.0/10    azure_oai
    # Anthropic (AWS us-east-1)
    3.208.0.0/12    anthropic
    34.0.0.0/8      anthropic
    # Google Vertex AI
    34.64.0.0/10    vertex_ai
    # Cohere
    35.186.0.0/16   cohere
