# IMPORTANT: Do NOT commit real secrets to source control.
# This file is a template — values are base64-encoded placeholders.
# In production use:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault + Vault Agent Injector
#   - kubectl create secret generic tsm-secrets --from-env-file=.env.prod
#
# Generate secrets:
#   openssl rand -hex 32        → audit-secret, postgres-password, redis-password, clickhouse-password
#   openssl rand -base64 36     → jwt-secret
apiVersion: v1
kind: Secret
metadata:
  name: tsm-secrets
  namespace: tsm
type: Opaque
data:
  # ── Core secrets ──────────────────────────────────────────────────────────────
  # echo -n 'REPLACE_WITH_STRONG_32BYTE_SECRET' | base64
  audit-secret:         UkVQTEFDRV9XSVRIX1NUUk9OR18zMkJZVEVfU0VDUkVU

  # echo -n 'REPLACE_ME_PG_PASSWORD' | base64
  postgres-password:    UkVQTEFDRV9NRV9QR19QQVNTV09SRA==

  # echo -n 'REPLACE_ME_REDIS_PASSWORD' | base64
  redis-password:       UkVQTEFDRV9NRV9SRURJU19QQVNTV09SRA==

  # echo -n 'REPLACE_ME_JWT_SECRET_MIN_32_CHARS' | base64
  jwt-secret:           UkVQTEFDRV9NRV9KV1RfU0VDUkVUX01JTl8zMl9DSEFSU18=

  # ── AI API keys ───────────────────────────────────────────────────────────────
  # echo -n 'sk-...' | base64
  openai-api-key:       c2stUkVQTEFDRV9NRQ==

  # echo -n 'sk-ant-...' | base64
  anthropic-api-key:    c2stYW50LVJFUFJMQUNFX01F

  # ── ClickHouse ────────────────────────────────────────────────────────────────
  # echo -n 'REPLACE_ME_CH_PASSWORD' | base64
  clickhouse-password:  UkVQTEFDRV9NRV9DSF9QQVNTV09SRA==

  # ── Threat-intel feed API keys ────────────────────────────────────────────────
  # NVD (optional — raises rate limit): https://nvd.nist.gov/developers/request-an-api-key
  # echo -n 'YOUR_NVD_API_KEY' | base64  (or leave as empty string)
  nvd-api-key:          ""

  # AbuseIPDB (required for AbuseIPDB feed): https://www.abuseipdb.com/account/api
  # echo -n 'YOUR_ABUSEIPDB_KEY' | base64
  abuseipdb-key:        ""

  # AlienVault OTX (required for OTX feed): https://otx.alienvault.com/api
  # echo -n 'YOUR_OTX_API_KEY' | base64
  otx-api-key:          ""
